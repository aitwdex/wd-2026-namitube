<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お天気チェッカー</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
 <style>
    body { font-family: sans-serif; margin: 0; padding: 1rem; }
    /* 広い画面：Flexboxで横並び（固定pxにしない） */
    .container {
      display: flex;
      gap: 1rem;
    }
    .card {
      flex: 1;             /* 幅を均等に分け合う */
      padding: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }
    /* 狭い画面（600px以下） */
    @media (max-width: 600px) {
      #temp
      {
        .width = 100rem;
      }
    }
  </style>
  
  <div class="container my-4">
    <h1 id="name">〇〇の天気</h1>

    <input type="text" id="prefecture"  required>

    <button id="getBtn" class="btn btn-primary">天気を取得</button>

    <div id="result" class="card mt-3" style="width: 35rem;">
      <div class="card-body">
        <p id="temp" class="card-text">〇〇県などと県名をフルネームで入力してボタンを押してください</p>
      </div>
    </div>
  </div>


  <script type="module" src="js/main.js"></script>
</body>
<!-- ページの一番下などに、データの出典を表示する -->
<footer>
  <small>Weather data by <a href="https://open-meteo.com/">Open-Meteo.com</a>（CC BY 4.0）</small>

   <p><small>Latitude and Longitude data by <a href="https://www.benricho.org/chimei/latlng_data.html">benricho.org</a></small></p>
</footer>

</html>
