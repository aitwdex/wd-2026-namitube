<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- ↓ビューポート -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お天気チェッカー</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
  
    /* 広い画面：Flexboxで横並び（固定pxにしない） */
      .container
      {
        display: flex;
        /* 縦表示に固定 */
        flex-direction: column;
        /* ↓要素と要素の余白を一律設定 */
        gap: 1rem;
      }


      #result
      {
        /* 広い画面でも大きさを制限する */
        max-width: 35rem;
      }

      #prefecture
      {
         /* 広い画面でも大きさを制限する */
        max-width: 30rem;
      }

      .btn
    {
      max-width: 20%;
    } 




    /* 狭い画面（767x以下） */
    @media (max-width: 767px) {

      #name
      {
       text-align:center;
      }

    .btn
    {
       /* 上で書いたmax-widthの制限に引っかかってしまうので更新する */
      max-width: 100%;
       width: 100%;
      margin: 5% 0 0 0;
    }

    
   

    .card-text
    {
      text-align:center;
      font-size: 60%;
    }
    #prefecture
    {
      text-align: center;
      width: 100%;
      padding :5% 0 5% 0;
    }

  }
  </style>



<body>


  <div class="container my-4">
    <h1 id="name">〇〇の天気</h1>

    <input type="text" id="prefecture"  required>

    <button id="getBtn" class="btn btn-primary">天気を取得</button>

    <div id="result" class="card mt-1"">
      <div class="card-body">
        <p id="temp" class="card-text">〇〇県などと県名をフルネームで入力してボタンを押してください</p>
      </div>
    </div>
  </div>


  <script type="module" src="js/main.js"></script>
</body>
<!-- ページの一番下などに、データの出典を表示する -->
<footer>
  <small>Weather data by <a href="https://open-meteo.com/">Open-Meteo.com</a>（CC BY 4.0）</small>

   <p><small>Latitude and Longitude data by <a href="https://www.benricho.org/chimei/latlng_data.html">benricho.org</a></small></p>
</footer>

</html>
